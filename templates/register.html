{% extends "base.html" %}
{% block title %}Sign Up — LaunchShare{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C9 5 7 9 7 13h10c0-4-2-8-5-11z" fill="white"/>
                    <path d="M9.5 13l-1.5 6h8l-1.5-6H9.5z" fill="white" opacity="0.7"/>
                    <circle cx="12" cy="10" r="2" fill="#06b6d4"/>
                </svg>
            </div>
            LaunchShare
        </div>

        <h1>Create Account</h1>
        <p class="subtitle">Join and start earning XP on your career goals.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g., jsmith" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@babson.edu" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Launch My Account &#128640;</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
