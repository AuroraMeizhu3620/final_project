{% extends "base.html" %}
{% block title %}Share a Tip — LaunchShare{% endblock %}

{% block content %}

<!-- ── Launch Overlay ── -->
<div id="launch-overlay">
    <div class="launch-scene">

        <!-- Stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>

        <!-- Rocket -->
        <div class="rocket" id="rocket">
            <svg width="60" height="100" viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Body -->
                <path d="M30 4 C18 20 14 45 14 62 L46 62 C46 45 42 20 30 4Z" fill="#8b5cf6"/>
                <path d="M30 4 C36 20 38 45 38 62 L46 62 C46 45 42 20 30 4Z" fill="#6d28d9"/>
                <!-- Window -->
                <circle cx="30" cy="36" r="8" fill="#0d1424" stroke="#06b6d4" stroke-width="2"/>
                <circle cx="30" cy="36" r="4" fill="#06b6d4" opacity="0.6"/>
                <!-- Left fin -->
                <path d="M14 62 L4 78 L14 74 Z" fill="#6d28d9"/>
                <!-- Right fin -->
                <path d="M46 62 L56 78 L46 74 Z" fill="#4c1d95"/>
                <!-- Exhaust nozzle -->
                <rect x="22" y="62" width="16" height="8" rx="2" fill="#4c1d95"/>
            </svg>

            <!-- Flame -->
            <div class="flame-wrap">
                <div class="flame f-outer"></div>
                <div class="flame f-mid"></div>
                <div class="flame f-inner"></div>
            </div>
        </div>

        <!-- Text -->
        <div class="launch-text">
            <p class="launch-title" id="launch-title">Preparing for launch...</p>
            <div class="launch-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
</div>

<!-- ── Form ── -->
<div class="form-container">
    <h1>&#128640; Share a Career Tip</h1>
    <p class="subtitle">Share your advice and attach a mission task list for others to launch from.</p>

    <form method="POST" action="{{ url_for('create_post') }}" id="create-form">

        <div class="form-group">
            <label for="title">Mission Title *</label>
            <input type="text" id="title" name="title"
                placeholder="e.g., How I landed my first tech internship" required>
        </div>

        <div class="form-group">
            <label for="description">Your Tip *</label>
            <textarea id="description" name="description" rows="6"
                placeholder="Share what you did, what worked, and what others can replicate." required></textarea>
        </div>

        <div class="form-group">
            <label for="tags">Tags <span class="optional">(comma-separated)</span></label>
            <input type="text" id="tags" name="tags" placeholder="e.g., tech, internship, networking">
        </div>

        <!-- Task Mode Toggle -->
        <div class="form-group">
            <label>Task List *</label>
            <div class="task-mode-toggle">
                <label class="mode-option" id="mode-ai-label">
                    <input type="radio" name="task_mode" value="ai" checked onchange="setMode('ai')">
                    <span class="mode-icon">&#129302;</span>
                    <span class="mode-text">
                        <strong>AI Generate</strong>
                        <small>Let AI create 5-7 tasks from your tip</small>
                    </span>
                </label>
                <label class="mode-option" id="mode-manual-label">
                    <input type="radio" name="task_mode" value="manual" onchange="setMode('manual')">
                    <span class="mode-icon">&#9997;</span>
                    <span class="mode-text">
                        <strong>Write My Own</strong>
                        <small>Enter tasks yourself, one per line</small>
                    </span>
                </label>
            </div>
        </div>

        <div class="form-group" id="manual-tasks-group" style="display:none;">
            <label for="manual_tasks">Your Tasks <span class="optional">(one per line)</span></label>
            <textarea id="manual_tasks" name="manual_tasks" rows="7"
                placeholder="Update your LinkedIn headline&#10;Email 3 alumni from your target industry&#10;Apply to 2 internship postings"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">&#129302; Generate Mission Tasks</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>


<style>
/* ── Launch Overlay ─────────────────────────────────────────── */
#launch-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0d1a3a 0%, #07090f 100%);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}
#launch-overlay.active { display: flex; }

.launch-scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    position: relative;
    width: 100%;
    height: 100%;
    justify-content: center;
}

/* Stars */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
.s1 { width:3px; height:3px; top:10%; left:15%; animation-delay:0s; }
.s2 { width:2px; height:2px; top:20%; left:75%; animation-delay:0.4s; }
.s3 { width:4px; height:4px; top:35%; left:90%; animation-delay:0.8s; }
.s4 { width:2px; height:2px; top:60%; left:8%;  animation-delay:1.2s; }
.s5 { width:3px; height:3px; top:75%; left:60%; animation-delay:0.2s; }
.s6 { width:2px; height:2px; top:15%; left:45%; animation-delay:0.6s; }
.s7 { width:3px; height:3px; top:80%; left:30%; animation-delay:1.0s; }
.s8 { width:2px; height:2px; top:50%; left:85%; animation-delay:1.4s; }

@keyframes twinkle {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.2; transform: scale(0.6); }
}

/* Rocket */
.rocket {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: launch 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    animation-play-state: paused;
}
.rocket.go { animation-play-state: running; }

@keyframes launch {
    0%   { transform: translateY(60px) scale(1);   opacity: 1; }
    15%  { transform: translateY(40px) scale(1.04); opacity: 1; }
    100% { transform: translateY(-120vh) scale(0.6); opacity: 0; }
}

/* Rocket idle hover */
.rocket:not(.go) {
    animation: hover 1.8s ease-in-out infinite;
}
@keyframes hover {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-10px); }
}

/* Flame */
.flame-wrap {
    position: relative;
    width: 30px;
    height: 50px;
    margin-top: -4px;
}
.flame {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.18s ease-in-out infinite alternate;
}
.f-outer {
    width: 30px; height: 50px;
    background: linear-gradient(to bottom, #f97316, #ef4444, transparent);
    opacity: 0.9;
    animation-duration: 0.2s;
}
.f-mid {
    width: 20px; height: 38px;
    top: 4px;
    background: linear-gradient(to bottom, #fbbf24, #f97316, transparent);
    animation-duration: 0.15s;
    animation-delay: 0.05s;
}
.f-inner {
    width: 10px; height: 24px;
    top: 10px;
    background: linear-gradient(to bottom, #fef9c3, #fbbf24, transparent);
    animation-duration: 0.12s;
    animation-delay: 0.03s;
}
@keyframes flicker {
    0%   { transform: translateX(-50%) scaleY(1)   scaleX(1); }
    100% { transform: translateX(-50%) scaleY(0.88) scaleX(1.08); }
}

/* Text */
.launch-text { text-align: center; }
.launch-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 0.75rem;
    min-height: 1.5em;
}
.launch-dots {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
}
.launch-dots span {
    width: 8px; height: 8px;
    background: #8b5cf6;
    border-radius: 50%;
    animation: dot-bounce 1.2s infinite;
}
.launch-dots span:nth-child(2) { animation-delay: 0.2s; background: #6366f1; }
.launch-dots span:nth-child(3) { animation-delay: 0.4s; background: #06b6d4; }
@keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0);   opacity: 0.4; }
    40%            { transform: translateY(-8px); opacity: 1; }
}
</style>


<script>
var currentMode = 'ai';

function setMode(mode) {
    currentMode = mode;
    var manualGroup = document.getElementById('manual-tasks-group');
    var submitBtn   = document.getElementById('submit-btn');
    var aiLabel     = document.getElementById('mode-ai-label');
    var manualLabel = document.getElementById('mode-manual-label');

    if (mode === 'manual') {
        manualGroup.style.display = 'block';
        submitBtn.innerHTML = '&#9997; Save Mission';
        aiLabel.classList.remove('mode-active');
        manualLabel.classList.add('mode-active');
    } else {
        manualGroup.style.display = 'none';
        submitBtn.innerHTML = '&#129302; Generate Mission Tasks';
        manualLabel.classList.remove('mode-active');
        aiLabel.classList.add('mode-active');
    }
}

document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('mode-ai-label').classList.add('mode-active');

    var form    = document.getElementById('create-form');
    var overlay = document.getElementById('launch-overlay');
    var rocket  = document.getElementById('rocket');
    var titleEl = document.getElementById('launch-title');

    var messages = [
        'Preparing for launch...',
        'AI is analyzing your tip...',
        'Building your mission plan...',
        'Generating action tasks...',
        'Almost ready for liftoff...'
    ];
    var msgIndex = 0;
    var msgTimer = null;

    function cycleMessages() {
        msgIndex = (msgIndex + 1) % messages.length;
        titleEl.textContent = messages[msgIndex];
        msgTimer = setTimeout(cycleMessages, 2200);
    }

    form.addEventListener('submit', function (e) {
        // Only show animation for AI mode
        if (currentMode !== 'ai') return;

        // Show overlay
        overlay.classList.add('active');
        titleEl.textContent = messages[0];

        // Start message cycling after short delay
        setTimeout(cycleMessages, 2200);

        // Hover for 1s, then launch
        setTimeout(function () {
            rocket.classList.add('go');
        }, 1000);
    });
});
</script>

{% endblock %}
